# dark-factory configuration
#
# All fields are optional. Missing fields use defaults shown below.

# GitHub API authentication
# Default: ${DARK_FACTORY_GITHUB_TOKEN} — reads from env var automatically
# Set the env var to use a bot account for PR creation
# If env var is unset, falls back to default gh auth silently
# github:
#   token: ${DARK_FACTORY_GITHUB_TOKEN}

# Git workflow after prompt execution
# "direct" = commit + tag + push to current branch (default)
# "pr" = create feature branch + PR
# "worktree" = create worktree + feature branch + PR
workflow: direct

# Auto-merge PRs after they pass checks (requires workflow: pr or worktree)
# When enabled, dark-factory waits for PR to be mergeable and merges it
# Default: false
# autoMerge: false

# Auto-release after PR merge (requires autoMerge: true)
# When enabled and CHANGELOG.md exists, creates a release after merge
# Default: false
# autoRelease: false

# Passive drop zone for new prompts (no automation)
inboxDir: prompts

# Watcher monitors this directory, processor executes from here
queueDir: prompts/queue

# Completed prompts are archived here
completedDir: prompts/completed

# Docker image for YOLO execution
containerImage: docker.io/bborbe/claude-yolo:v0.0.9

# Watcher debounce in milliseconds
debounceMs: 500

# REST API server port
serverPort: 8080
