# dark-factory configuration — all defaults
#
# Copy to your project root as .dark-factory.yaml
# All fields are optional. Missing fields use these defaults.

projectName: ""
github:
  token: ${DARK_FACTORY_GITHUB_TOKEN}
pr: false
worktree: false
autoMerge: false
autoRelease: false
autoReview: false
maxReviewRetries: 3
allowedReviewers: []
useCollaborators: false
pollIntervalSec: 60
prompts:
  inboxDir: prompts
  inProgressDir: prompts/in-progress
  completedDir: prompts/completed
  logDir: prompts/log
specs:
  inboxDir: specs
  inProgressDir: specs/in-progress
  completedDir: specs/completed
  logDir: specs/log
containerImage: docker.io/bborbe/claude-yolo:v0.5.4
model: claude-sonnet-4-6
maxContainers: 0
debounceMs: 500
serverPort: 0
generateCommand: /dark-factory:generate-prompts-for-spec
claudeDir: ~/.claude-yolo
additionalInstructions: ""
extraMounts:
  - src: ${GOPATH}/pkg
    dst: /home/node/go/pkg
